<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fortune Solutions - Imobiliária</title>
  <link rel="stylesheet" href="../Style/style.css" />
</head>
<body>

  
  <header>
  <div class="header-container">
    <div class="brand">
      <img src="../assets/imagens/lg.png" alt="Logo da Fortune Solutions" class="logo-header">
      <h3>Fortune Solutions</h3>
    </div>
  </div>
</header>


  

  <!-- === VÍDEO DE FUNDO === -->
  <video autoplay muted loop playsinline id="bg-video">
    <source src="../assets/video/casas.mp4" type="video/mp4">
    Seu navegador não suporta vídeo em HTML5.
  </video>

  <!-- === CONTAINER CENTRAL COM LOGO E BOTÃO === -->
  <div class="central-container">
    <img src="../assets/imagens/lg.png" alt="Logo da Imobiliária" class="logo">
    <button class="btn-servicos" id="abrirModal">Selecione o serviço</button>
  </div>

  <!-- === MODAL === -->
  <div id="modalServicos" class="modal">
    <div class="modal-content">
      <span class="fechar" id="fecharModal">&times;</span>
      <h2>Escolha um serviço</h2>
      <div class="servicos-container">
       <div class="servicos-container">
  <a href="../Pages/inicio.html" class="servico-item">
    <img src="../assets/imagens/images.jpg" alt="Reforma" />
    <p>Reforma</p>
  </a>

  <a href="compraevenda.html" class="servico-item">
    <img src="../assets/imagens/images3.jpg" alt="Compra e Venda" />
    <p>Compra e Venda</p>
  </a>

  <a href="seguros.html" class="servico-item">
    <img src="../assets/imagens/images.jpg" alt="Seguros" />
    <p>Seguros</p>
  </a>

  <a href="aluguel.html" class="servico-item">
    <img src="../assets/imagens/images3.jpg" alt="Aluguel" />
    <p>Aluguel</p>
  </a>
</div>

      </div>
    </div>
  </div>

  <footer>
    <p>© 2025 Fortune Solutions - Todos os direitos reservados.</p>
  </footer>

  <script src="script.js">
    document.addEventListener('DOMContentLoaded', function() {
      const video = document.getElementById('bg-video');
      if (video) {
        video.play().catch(() => {
          document.body.addEventListener('touchstart', () => {
            video.play();
          }, { once: true });
        });
      }
    });

    
  </script>
</body>
</html>
