<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fortune Solutions - Imobiliária</title>
  <link rel="stylesheet" href="../Style/style.css" />
</head>

<body>
  <header class="site-header">
    <div class="header-container">
      <a class="brand" href="./Index.html" aria-label="Ir para a página inicial">
        <img src="../assets/imagens/lg.png" alt="Logo da Fortune Solutions" class="logo-header">
        <h3>Fortune Solutions</h3>
      </a>
    </div>
  </header>

  <!-- Vídeo de fundo -->
  <video autoplay muted loop playsinline id="bg-video" aria-hidden="true">
    <source src="../assets/video/casas.mp4" type="video/mp4">
    Seu navegador não suporta vídeo em HTML5.
  </video>

  <!-- Conteúdo central -->
  <main class="central-container">
    <img src="../assets/imagens/lg.png" alt="Logo da Fortune Solutions" class="logo">
    <button class="btn-servicos" id="abrirModal" type="button">
      Selecione o serviço
    </button>
  </main>

  <!-- Modal -->
  <div id="modalServicos" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="tituloModal">
    <div class="modal-content" role="document">
      <button class="fechar" id="fecharModal" type="button" aria-label="Fechar modal">×</button>

      <h2 id="tituloModal">Escolha um serviço</h2>

      <!-- Etapa 1 -->
      <div class="categorias-container" id="categoriasContainer">
        <button class="categoria-item" id="btnServicosImobiliarios" type="button">
          <span>Serviços Imobiliários</span>
        </button>

        <button class="categoria-item" id="btnOutrosServicos" type="button">
          <span>Outros Serviços</span>
        </button>
      </div>

      <!-- Etapa 2: imobiliária -->
      <div class="grupo-servicos" id="grupoImobiliaria" hidden>
        <button class="btn-voltar-servicos" id="voltarParaCategorias1" type="button">
          ← Voltar
        </button>

        <div class="lista-servicos">
          <a href="../Pages/compravenda.html" class="lista-servico-item">Compra e Venda</a>
          <a href="../Pages/aluguel.html" class="lista-servico-item">Aluguel</a>
        </div>
      </div>

      <!-- Etapa 2: outros -->
      <div class="grupo-servicos" id="grupoOutros" hidden>
        <button class="btn-voltar-servicos" id="voltarParaCategorias2" type="button">
          ← Voltar
        </button>

        <div class="lista-servicos">
          <a href="../Pages/reforma.html" class="lista-servico-item">Reforma</a>
          <a href="../Pages/seguros.html" class="lista-servico-item">Seguros</a>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>© 2025 Fortune Solutions - Todos os direitos reservados.</p>
  </footer>

  <!-- JS sempre no final -->
  <script src="../script/script.js" defer></script>
</body>
</html>
